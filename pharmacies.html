<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmacy Website</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-size: cover;
            background: linear-gradient(to right, white, #004F75);
            background-size: cover;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

       
        header {
            background: #004F75;
            color: white;
            height: 100px;
            padding: 15px;
            text-align: center;
        }
        nav ul {
            list-style: none;
            padding: 0;
            display: flex;
            justify-content: center;
            gap: 15px;
        }
       
        .categories {
            display: flex;
            justify-content: space-around;
            padding: 20px;
        }
        .category {
            background: #ddd;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
        }
    
        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 10px;
            position: relative;
            bottom: 0;
            width: 100%;
        }
        .search-bar {
            display: flex;
            justify-content: center;
            margin: 20px 0;
            padding: 10px;
            
        }
    </style>
</head>

    <body onload="showAlert()">
    <header><a href="index.html"><img src="novacare(1).png" alt="Logo" style="width: 50px; height:50px;"></a>
        <h1>Pharmacy</h1>
    </header>
    <br><br>
    <div class="search-bar" style="text-align: center;"> 
        <ion-icon name="search-outline"></ion-icon>
    <input type="search"  placeholder="Search for medicines..." style="width: 400px; padding: 10px; margin: 20px;text-align: center;height: 50px;border-radius: 5px;">
    </div>
    <br>    
    <main> 
        <section class="categories">
            <div class="container">
                <img src="fitness.jpg" alt="Medicine" style="width: 250px;height:200px;">
            <div class="category" style="background-color: #004F75;">
                <a href="https://en.wikipedia.org/wiki/Paracetamol" style="color: white;">Medicine</a></div>
            </div>
            <div class="container">
                <img src="health.jpg"  style="width: 250px;height:200px;">
                <div class="category" style="background-color: #004F75;">
                    <a href="https://www.medicinenet.com/what_is_health_and_wellness/article.htm" style="color: white;">Health & Wellness</a>
                </div>
            </div>
            <div class="container">
                <img src="medicine.jpg"  style="width: 300px;height:200px;">
                <div class="category" style="background-color: #004F75;">
                    <a href="https://en.wikipedia.org/wiki/Fitness" style="color: white;">Fitness </a></div>
            </div>
        </section>
       
    </main>
    <br><br><br>
    <footer>
        <p>&copy; 2025 Pharmacy. All rights reserved.</p>
    </footer>
    <script>
        function showAlert() {
            alert('Welcome to the Pharmacy Website!');
        }
    </script>
</body>
</html>
